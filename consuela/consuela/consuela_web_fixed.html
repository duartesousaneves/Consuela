<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consuela</title>
    <style>
        :root {
            --color-header:       #1A1A2E;
            --color-primary:      #E8899A;
            --color-primary-dark: #C4667A;
            --color-teal:         #7BBFCC;
            --color-teal-light:   #C5DCF0;
            --color-bg:           #FFF8F9;
            --color-surface:      #F8F0F2;
            --color-text:         #2D2D2D;
            --color-text-muted:   #888;
            --radius:             12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ─────────────────────────────────────────── */
        .header {
            background: var(--color-header);
            color: white;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px 10px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--color-primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar svg { width: 44px; height: 44px; }

        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .status-dot.error { background: #EF5350; }

        /* ── SUMMARY PANEL ───────────────────────────────────── */
        .summary-panel {
            padding: 0 20px 14px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .summary-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 12px;
            text-align: center;
        }

        .summary-card-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1;
        }

        .summary-card-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upcoming-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .upcoming-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.75);
        }

        .upcoming-time {
            font-variant-numeric: tabular-nums;
            color: var(--color-teal);
            font-weight: 600;
            min-width: 38px;
        }

        .upcoming-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── CHAT AREA ───────────────────────────────────────── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--color-bg);
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 2px; }

        /* ── MESSAGES ────────────────────────────────────────── */
        .message {
            display: flex;
            gap: 8px;
            animation: fadeUp 0.25s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            align-self: flex-end;
            background: var(--color-primary-dark);
        }

        .msg-avatar svg { width: 30px; height: 30px; }

        .message.user .msg-avatar { order: 2; }

        .msg-body { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
        .message.user .msg-body { align-items: flex-end; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.bot .msg-bubble {
            background: var(--color-primary);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: var(--color-header);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble ul {
            padding-left: 18px;
            margin: 4px 0;
        }

        .msg-bubble li { margin: 2px 0; }

        .msg-time {
            font-size: 11px;
            color: var(--color-text-muted);
            padding: 0 4px;
        }

        /* ── EMAIL CARDS ─────────────────────────────────────── */
        .email-cards {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
            max-width: 100%;
        }

        .email-card {
            background: var(--color-surface);
            border: 1px solid rgba(196,102,122,0.2);
            border-left: 3px solid var(--color-primary-dark);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
        }

        .email-card-from {
            font-weight: 600;
            color: var(--color-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-card-subject {
            color: var(--color-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin: 2px 0;
        }

        .email-card-preview {
            font-size: 12px;
            color: var(--color-text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-card-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .card-btn {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            background: transparent;
        }

        .card-btn-archive {
            color: var(--color-teal);
            border-color: var(--color-teal);
        }
        .card-btn-archive:hover { background: var(--color-teal); color: white; }

        .card-btn-delete {
            color: #EF5350;
            border-color: #EF5350;
        }
        .card-btn-delete:hover { background: #EF5350; color: white; }

        .card-btn-thread {
            color: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
        }
        .card-btn-thread:hover { background: var(--color-primary-dark); color: white; }

        /* ── TYPING ──────────────────────────────────────────── */
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── INPUT AREA ──────────────────────────────────────── */
        .input-area {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid rgba(196,102,122,0.15);
        }

        #messageInput {
            flex: 1;
            border: 1px solid rgba(196,102,122,0.3);
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            background: var(--color-bg);
            color: var(--color-text);
            transition: border-color 0.2s;
        }

        #messageInput:focus { border-color: var(--color-primary-dark); }

        #sendBtn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--color-primary-dark);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
        }

        #sendBtn:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.05); }
        #sendBtn:active:not(:disabled) { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ─── AVATAR SVG (Consuela) ──────────────────────────────────────────────── -->
<template id="tpl-avatar">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Hair sides -->
  <ellipse cx="21" cy="32" rx="8" ry="14" fill="#2C1A0E"/>
  <ellipse cx="59" cy="32" rx="8" ry="14" fill="#2C1A0E"/>
  <!-- Face -->
  <circle cx="40" cy="34" r="17" fill="#F4C2A1"/>
  <!-- Hair top + bun -->
  <ellipse cx="40" cy="20" rx="17" ry="9" fill="#2C1A0E"/>
  <ellipse cx="40" cy="13" rx="9" ry="7" fill="#2C1A0E"/>
  <circle cx="40" cy="8" r="5" fill="#2C1A0E"/>
  <!-- Eyebrows (slightly furrowed) -->
  <path d="M29 28 Q33 26 37 28" stroke="#2C1A0E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M43 28 Q47 26 51 28" stroke="#2C1A0E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="33" cy="32" r="2.8" fill="#2C1A0E"/>
  <circle cx="47" cy="32" r="2.8" fill="#2C1A0E"/>
  <circle cx="34" cy="31" r="0.9" fill="white"/>
  <circle cx="48" cy="31" r="0.9" fill="white"/>
  <!-- Nose -->
  <path d="M39 36 Q40 38 41 36" stroke="#D4906E" stroke-width="1" fill="none"/>
  <!-- Mouth (flat / skeptical) -->
  <path d="M35 42 Q40 44 45 42" stroke="#C4667A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="35" y="49" width="10" height="7" fill="#F4C2A1"/>
  <!-- Body / maid uniform -->
  <path d="M18 56 Q18 80 40 80 Q62 80 62 56 L56 52 Q48 60 40 60 Q32 60 24 52 Z" fill="#E8899A"/>
  <!-- White apron -->
  <path d="M28 54 Q28 76 40 76 Q52 76 52 54 L48 52 Q44 62 40 62 Q36 62 32 52 Z" fill="white" opacity="0.85"/>
  <!-- Collar -->
  <path d="M24 52 Q40 58 56 52 Q50 46 40 48 Q30 46 24 52Z" fill="#C4667A"/>
</svg>
</template>

<div class="header">
    <div class="header-top">
        <div class="avatar" id="headerAvatar"></div>
        <div class="header-title">
            <h1>Consuela</h1>
            <div class="header-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">a carregar...</span>
            </div>
        </div>
    </div>
    <div class="summary-panel">
        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-card-value" id="val-unread">--</div>
                <div class="summary-card-label">não lidos</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-value" id="val-today">--</div>
                <div class="summary-card-label">hoje</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-value" id="val-tomorrow">--</div>
                <div class="summary-card-label">amanhã</div>
            </div>
        </div>
        <div class="upcoming-list" id="upcomingList"></div>
    </div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Fala comigo, mister..." autocomplete="off"/>
    <button id="sendBtn" title="Enviar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
</div>

<script>
    // ─── Avatar ───────────────────────────────────────────────────────────────
    const avatarSvg = document.getElementById('tpl-avatar').innerHTML;
    document.getElementById('headerAvatar').innerHTML = avatarSvg;

    // ─── Markdown renderer ────────────────────────────────────────────────────
    function renderMarkdown(raw) {
        const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const inline = s => s
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');

        const lines = raw.split('\n');
        let html = '';
        let inList = false;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (/^[-•] /.test(line)) {
                if (!inList) { html += '<ul>'; inList = true; }
                html += `<li>${inline(esc(line.slice(2)))}</li>`;
            } else {
                if (inList) { html += '</ul>'; inList = false; }
                if (line.trim() === '') {
                    html += '<br>';
                } else {
                    html += inline(esc(line)) + '<br>';
                }
            }
        }
        if (inList) html += '</ul>';
        // Remove trailing <br>
        return html.replace(/(<br>)+$/, '');
    }

    // ─── Time formatter ───────────────────────────────────────────────────────
    function nowTime() {
        return new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Build avatar element ─────────────────────────────────────────────────
    function makeAvatar(size) {
        const el = document.createElement('div');
        el.className = 'msg-avatar';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.innerHTML = avatarSvg;
        return el;
    }

    // ─── Email cards ──────────────────────────────────────────────────────────
    function buildEmailCards(emails) {
        if (!emails || emails.length === 0) return null;
        const container = document.createElement('div');
        container.className = 'email-cards';

        emails.forEach(email => {
            const card = document.createElement('div');
            card.className = 'email-card';
            card.innerHTML = `
                <div class="email-card-from">${esc(trimSender(email.from))}</div>
                <div class="email-card-subject">${esc(email.subject || '(sem assunto)')}</div>
                <div class="email-card-preview">${esc((email.preview || '').replace(/\n/g,' ').trim())}</div>
                <div class="email-card-actions">
                    <button class="card-btn card-btn-archive">Arquivar</button>
                    <button class="card-btn card-btn-delete">Apagar</button>
                    <button class="card-btn card-btn-thread">Ver thread</button>
                </div>
            `;
            const [btnArchive, btnDelete, btnThread] = card.querySelectorAll('.card-btn');
            btnArchive.onclick = () => sendMessage(`archive email ID ${email.id}`);
            btnDelete.onclick  = () => {
                if (confirm(`Apagar email de "${trimSender(email.from)}"?\n${email.subject}`)) {
                    sendMessage(`delete email ID ${email.id}`);
                }
            };
            btnThread.onclick  = () => sendMessage(`show thread ${email.threadId || email.id}`);
            container.appendChild(card);
        });
        return container;
    }

    function esc(s) {
        return String(s || '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
    }

    function trimSender(from) {
        // "Name Surname <email@x.com>" → "Name Surname"
        const m = from.match(/^"?([^"<]+)"?\s*</);
        return m ? m[1].trim() : from.split('@')[0];
    }

    // ─── Add message ──────────────────────────────────────────────────────────
    function addMessage(content, type, emails) {
        const wrap = document.createElement('div');
        wrap.className = `message ${type}`;

        const body = document.createElement('div');
        body.className = 'msg-body';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = type === 'bot' ? renderMarkdown(content) : esc(content);
        body.appendChild(bubble);

        if (type === 'bot' && emails && emails.length > 0) {
            const cards = buildEmailCards(emails);
            if (cards) body.appendChild(cards);
        }

        const timeEl = document.createElement('div');
        timeEl.className = 'msg-time';
        timeEl.textContent = nowTime();
        body.appendChild(timeEl);

        if (type === 'bot') {
            wrap.appendChild(makeAvatar(30));
        }
        wrap.appendChild(body);
        if (type === 'user') {
            wrap.appendChild(makeAvatar(30));
        }

        chatArea.appendChild(wrap);
        chatArea.scrollTop = chatArea.scrollHeight;
        return wrap;
    }

    function addTyping() {
        const wrap = document.createElement('div');
        wrap.className = 'message bot';
        wrap.id = 'typing';
        const avatar = makeAvatar(30);
        const body = document.createElement('div');
        body.className = 'msg-body';
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        body.appendChild(bubble);
        wrap.appendChild(avatar);
        wrap.appendChild(body);
        chatArea.appendChild(wrap);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    // ─── Chat logic ───────────────────────────────────────────────────────────
    const chatArea      = document.getElementById('chatArea');
    const messageInput  = document.getElementById('messageInput');
    const sendBtn       = document.getElementById('sendBtn');
    let isLoading = false;

    // Welcome message
    addMessage('Ay, mister... aqui estou. O que queres?', 'bot');

    async function sendMessage(text) {
        const message = (text || messageInput.value).trim();
        if (!message || isLoading) return;

        messageInput.value = '';
        addMessage(message, 'user');

        isLoading = true;
        sendBtn.disabled = true;
        addTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            removeTyping();

            if (!res.ok) {
                const err = await res.json();
                addMessage(`❌ ${err.error || 'Algo correu mal'}`, 'bot');
            } else {
                const data = await res.json();
                addMessage(data.response || '', 'bot', data.emails);
            }
        } catch (err) {
            removeTyping();
            addMessage(`❌ Erro de conexão: ${err.message}`, 'bot');
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', () => sendMessage());
    messageInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !isLoading) sendMessage();
    });

    // ─── Summary panel ────────────────────────────────────────────────────────
    async function loadSummary() {
        try {
            const res = await fetch('/api/summary');
            if (!res.ok) throw new Error('status ' + res.status);
            const data = await res.json();

            document.getElementById('val-unread').textContent   = data.unread_count   ?? '--';
            document.getElementById('val-today').textContent    = data.today_events   ?? '--';
            document.getElementById('val-tomorrow').textContent = data.tomorrow_events ?? '--';

            const list = document.getElementById('upcomingList');
            list.innerHTML = '';
            if (data.upcoming && data.upcoming.length > 0) {
                data.upcoming.forEach(ev => {
                    const item = document.createElement('div');
                    item.className = 'upcoming-item';
                    item.innerHTML = `
                        <span class="upcoming-time">${esc(ev.time)}</span>
                        <span class="upcoming-title">${esc(ev.title)}</span>
                    `;
                    list.appendChild(item);
                });
            }

            document.getElementById('statusDot').className = 'status-dot';
            document.getElementById('statusText').textContent = 'online';
        } catch (e) {
            document.getElementById('statusDot').className = 'status-dot error';
            document.getElementById('statusText').textContent = 'sem ligação';
        }
    }

    loadSummary();
</script>
</body>
</html>
