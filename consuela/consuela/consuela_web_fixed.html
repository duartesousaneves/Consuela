<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧹 Consuela - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            font-size: 24px;
            display: flex;
            align-items: flex-end;
            height: 100%;
        }

        .message.user .message-avatar {
            order: 2;
        }

        .typing {
            display: flex;
            gap: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            border-top: 1px solid #eee;
            padding: 16px;
            background: white;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .suggestion {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .suggestion-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }

        .error-message {
            background: #ffebee;
            color: #d32f2f;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧹 Consuela</h1>
            <p>A tua assistente "má" de email & calendário</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="message-avatar">🧹</div>
                <div class="message-content">
                    Ay, mister... aqui estou. O que queres? Mostra-me emails? Quer saber sobre o calendário? Fala!
                </div>
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Fala comigo, mister..."
                autocomplete="off"
            />
            <button id="sendBtn" title="Enviar">➤</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let isLoading = false;

        const suggestions = [
            'Mostra-me os emails',
            'Que eventos tenho?',
            'Emails sobre filmes',
            'Que fazer com isto?'
        ];

        // Adicionar sugestões iniciais
        function addInitialSuggestions() {
            const suggestionDiv = document.createElement('div');
            suggestionDiv.style.marginTop = '10px';
            suggestionDiv.innerHTML = '<p style="font-size: 12px; color: #999; margin-bottom: 10px;">💡 Sugestões:</p>';
            
            const suggestionBtns = document.createElement('div');
            suggestionBtns.className = 'suggestion';
            
            suggestions.forEach(suggestion => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = suggestion;
                btn.onclick = () => {
                    messageInput.value = suggestion;
                    sendMessage();
                };
                suggestionBtns.appendChild(btn);
            });
            
            suggestionDiv.appendChild(suggestionBtns);
            chatArea.appendChild(suggestionDiv);
        }

        // Adiciona uma mensagem no chat
        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${type === 'bot' ? '🧹' : '👤'}</div>
                <div class="message-content">${content}</div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Mostra indicador de digitação
        function showTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = `
                <div class="message-avatar">🧹</div>
                <div class="message-content">
                    <div class="typing">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Remove indicador de digitação
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Envia mensagem
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Limpar sugestões se existirem
            const suggestions = chatArea.querySelector('.suggestion');
            if (suggestions) {
                suggestions.parentElement.remove();
            }

            // Adiciona mensagem do utilizador
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.focus();

            isLoading = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                removeTyping();

                if (!response.ok) {
                    const errorData = await response.json();
                    addMessage(`❌ Erro: ${errorData.error || 'Algo correu mal'}`, 'bot');
                } else {
                    const data = await response.json();
                    addMessage(data.response, 'bot');
                }
            } catch (error) {
                removeTyping();
                addMessage(`❌ Ay, mister... erro de conexão: ${error.message}`, 'bot');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        // Mostra sugestões iniciais
        addInitialSuggestions();
    </script>
</body>
</html>
