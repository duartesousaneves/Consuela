<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧹 Consuela - Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            font-size: 24px;
            display: flex;
            align-items: flex-end;
            height: 100%;
        }

        .message.user .message-avatar {
            order: 2;
        }

        .typing {
            display: flex;
            gap: 4px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            border-top: 1px solid #eee;
            padding: 16px;
            background: white;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: #d32f2f;
            padding: 12px;
            background: #ffebee;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
        }

        .suggestion {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .suggestion-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function ConsuaChat() {
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    type: 'bot',
                    content: 'Ay, mister... aqui estou. O que queres? Mostra-me emails? Quer saber sobre o calendário? Fala!'
                }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;

                // Adiciona mensagem do utilizador
                const userMessage = {
                    id: Date.now(),
                    type: 'user',
                    content: input
                };

                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    // Simula resposta da Consuela
                    // Em produção, isto chamaria o backend Python
                    const response = await simulateConsuaResponse(input);
                    
                    const botMessage = {
                        id: Date.now() + 1,
                        type: 'bot',
                        content: response
                    };

                    setMessages(prev => [...prev, botMessage]);
                } catch (error) {
                    const errorMessage = {
                        id: Date.now() + 1,
                        type: 'bot',
                        content: '❌ Ay, mister... algo correu mal. Tenta novamente!'
                    };
                    setMessages(prev => [...prev, errorMessage]);
                } finally {
                    setLoading(false);
                }
            };

            const simulateConsuaResponse = (userInput) => {
                // Simulação - em produção, chamaria a API
                const responses = {
                    'olá': 'Ay, que tal? Aqui estou para organizar o teu caos de emails.',
                    'emails': 'Tens 5 emails não lidos. Quer que te mostre os importantes?',
                    'calendário': 'Tens 3 eventos esta semana. Nada de importante, mas pronto...',
                    'filmes': 'Procurando emails sobre filmes... Ay, encontrei um sobre cinema!',
                    'ajuda': 'Podes perguntar sobre emails, calendário, ou simplesmente conversar. Aqui estou.'
                };

                // Procura keyword no input
                for (const [key, value] of Object.entries(responses)) {
                    if (userInput.toLowerCase().includes(key)) {
                        return value;
                    }
                }

                return 'Ay, mister... não percebo bem. Mas tá bem, já me acostumei a não perceber nada contigo!';
            };

            const suggestions = [
                'Mostra-me os emails',
                'Que eventos tenho?',
                'Emails sobre filmes',
                'Que fazer com isto?'
            ];

            return (
                <div className="container">
                    <div className="header">
                        <h1>🧹 Consuela</h1>
                        <p>A tua assistente "má" de email & calendário</p>
                    </div>

                    <div className="chat-area">
                        {messages.map(msg => (
                            <div key={msg.id} className={`message ${msg.type}`}>
                                <div className="message-avatar">
                                    {msg.type === 'bot' ? '🧹' : '👤'}
                                </div>
                                <div className="message-content">
                                    {msg.content}
                                </div>
                            </div>
                        ))}

                        {loading && (
                            <div className="message bot">
                                <div className="message-avatar">🧹</div>
                                <div className="message-content">
                                    <div className="typing">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {messages.length === 1 && (
                            <div style={{marginTop: '10px'}}>
                                <p style={{fontSize: '12px', color: '#999', marginBottom: '10px'}}>
                                    💡 Sugestões:
                                </p>
                                <div className="suggestion">
                                    {suggestions.map((suggestion, idx) => (
                                        <button
                                            key={idx}
                                            className="suggestion-btn"
                                            onClick={() => {
                                                setInput(suggestion);
                                            }}
                                        >
                                            {suggestion}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div ref={chatEndRef} />
                    </div>

                    <div className="input-area">
                        <input
                            type="text"
                            placeholder="Fala comigo, mister..."
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            onKeyPress={e => {
                                if (e.key === 'Enter' && !loading) {
                                    handleSend();
                                }
                            }}
                            disabled={loading}
                        />
                        <button
                            onClick={handleSend}
                            disabled={loading || !input.trim()}
                            title="Enviar"
                        >
                            ➤
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ConsuaChat />, document.getElementById('root'));
    </script>
</body>
</html>
